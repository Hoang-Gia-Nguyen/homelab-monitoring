---
name: CI Pipeline

on: [push, pull_request]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install yamllint
          sudo apt-get update && sudo apt-get install -y jq gh

      - name: Lint YAML files
        run: |
          yamllint -c .github/linters/.yamllint.yaml .

      - name: Validate JSON files
        run: |
          find . -name "*.json" -print0 | while IFS= read -r -d '' file; do
            jq . "$file" > /dev/null || echo "Invalid JSON: $file"
          done

      - name: Validate docker-compose.yml (optional)
        run: |
          # Docker may not be available in the CI environment; ignore failures.
          docker compose version || docker-compose version || true
          docker compose config -q || docker-compose config -q || true

  integration-tests:
    if: true   # enable CI integration tests (requires Docker access)
    needs: lint-and-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Pull containers
        run: docker compose pull

      - name: Bring up services
        run: docker compose up -d

      - name: Wait for services healthy
        run: |
          # Give Prometheus up to ~5 minutes to become ready
          for i in {1..60}; do
            curl -sSf http://localhost:9090/-/ready && break || sleep 5
          done

      - name: Sanity checks (optional)
        run: |
          # If Prometheus is not ready, do not fail the job.
          curl -sSf http://localhost:9090/api/v1/query?query=up \
            || echo "Prometheus not responding"

      - name: Tear down services
        if: always()
        run: docker compose down
