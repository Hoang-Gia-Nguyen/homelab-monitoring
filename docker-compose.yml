services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 1024m
    mem_reservation: 256m
    cpus: '1.0'

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    ports:
      - "3007:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    env_file:
      - .env
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 128m
    cpus: '0.5'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: cadvisor
    ports:
      - "8087:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 128m
    cpus: '0.5'

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: alertmanager
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    env_file:
      - .env
    ports:
      - "9100:9093"
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    cpus: '0.3'

  alertmanager-bridge:
    build:
      context: .
      dockerfile: Dockerfile.alertmanager-bridge
    container_name: alertmanager-bridge
    ports:
      - "5001:5001"
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    cpus: '0.3'

  docker-info-exporter:
    build:
      context: .
      dockerfile: Dockerfile.docker-info-exporter
    container_name: docker-info-exporter
    ports:
      - "9108:9108"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    cpus: '0.3'

  ci-monitor:
    build:
      context: .
      dockerfile: Dockerfile.ci-monitor
    container_name: ci-monitor
    ports:
      - "9109:9109"
    environment:
      - GH_TOKEN=${GH_TOKEN:-}
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    volumes:
      - ./loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    command:
      - "-config.file=/etc/loki/config.yml"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command:
      - "-config.file=/etc/promtail/config.yml"

    restart: unless-stopped


  blackbox-exporter:
    image: prom/blackbox-exporter:v0.28.0
    container_name: blackbox-exporter
    command:
      - "--config.file=/config/blackbox.yml"
    volumes:
      - ./prometheus/blackbox.yml:/config/blackbox.yml:ro
    ports:
      - "9115:9115"
    restart: unless-stopped

volumes:
  loki_data:

  prometheus_data:
  grafana_data:
