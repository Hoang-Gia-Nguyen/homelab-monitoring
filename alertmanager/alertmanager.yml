global:
  resolve_timeout: 5m
  smtp_from: '{{ .Env.ALERTMANAGER_SMTP_FROM }}'
  smtp_smarthost: '{{ .Env.ALERTMANAGER_SMTP_HOST }}:{{ .Env.ALERTMANAGER_SMTP_PORT }}'
  smtp_auth_username: '{{ .Env.ALERTMANAGER_SMTP_USER }}'
  smtp_auth_password: '{{ .Env.ALERTMANAGER_SMTP_PASS }}'
  smtp_require_tls: true

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'ntfy'
  routes:
    - receiver: 'email-fallback'
      match_re:
        # Fallback to email when ntfy receiver is unreachable.
        # This is a logical route; the actual fallback is handled
        # by Alertmanager's delivery guarantees.
      continue: false

receivers:
  - name: 'ntfy'
    webhook_configs:
      - url: 'http://alertmanager-bridge:5001/webhook'
        send_resolved: true
        http_config:
          follow_redirects: true

  - name: 'email-fallback'
    email_configs:
      - to: '{{ .Env.ALERTMANAGER_SMTP_FROM }}'
        send_resolved: true
        headers:
          subject: '[{{ .GroupLabels.alertname }}] {{ .Status | toUpper }}'
        html: >
          <h2>{{ .Status | toUpper }}: {{ .GroupLabels.alertname }}</h2>
          {{ range .Alerts }}
            <p><b>{{ .Labels.severity }}</b>:
            {{ .Annotations.summary }}</p>
            <pre>{{ .Annotations.description }}</pre>
          {{ end }}
