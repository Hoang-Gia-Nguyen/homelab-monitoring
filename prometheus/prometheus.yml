---
global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

rule_files:
  - "alert_rules.yml"
  - "macos_compat_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['host.docker.internal:9107']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'gcp_vm'
    scheme: https
    static_configs:
      - targets: ['ne-gc-vm.hgnlab.org']

#   - job_name: 'ci_monitor'
#     static_configs:
#       - targets: ['host.docker.internal:9108']
