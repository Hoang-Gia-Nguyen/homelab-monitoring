global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

rule_files:
  - "alert_rules.yml"
  - "disk_forecast_rules.yml"
  - "macos_compat_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['host.docker.internal:9107']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'gcp_vm'
    scheme: https
    static_configs:
      - targets: ['ne-gc-vm.hgnlab.org']

  - job_name: 'docker_info_exporter'
    static_configs:
      - targets: ['docker-info-exporter:9108']

  - job_name: 'ci_monitor'
    static_configs:
      - targets: ['ci-monitor:9109']

  - job_name: 'blackbox_http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - 'https://ne-gc-vm.hgnlab.org'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: 'blackbox_http_internal'
    metrics_path: /probe
    params:
      module: [http_2xx_no_tls]
    static_configs:
      - targets: []
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
